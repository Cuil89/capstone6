<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Smart Pharmacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #f9fafb;
            --glass: rgba(255, 255, 255, 0.85);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            margin: 0;
        }
        .register-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        h2 {
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.85rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            margin-top: 1.5rem;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .divider-text {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
            color: #9ca3af;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .divider-text::before, .divider-text::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e5e7eb;
        }
        .divider-text::before { left: 0; }
        .divider-text::after { right: 0; }
        
        .btn-google {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }
        .btn-google:hover {
            background: #f9fafb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        .btn-google img {
            width: 18px;
            height: 18px;
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #6b7280;
        }
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container d-flex flex-column align-items-center">
        <div class="register-card">
            <div class="logo-area">
                <i class="fas fa-user-plus logo-icon"></i>
                <h2>Create Admin Account</h2>
                <p class="text-muted">Register a new administrator for the system</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="admin@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register Admin</button>
            </form>

            <div class="divider-text">
                <span>OR</span>
            </div>

            <div id="google-button-container" class="d-flex justify-content-center"></div>

            <div class="login-link">
                Already have an account? <a href="{{ url_for('admin_auth.login') }}">Log In</a>
            </div>
        </div>
    </div>
    <script>
        function handleCredentialResponse(response) {
            fetch('/admin/register/google', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ id_token: response.credential }),
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    alert(data.error || 'Google Registration Failed');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('An error occurred during Google Registration.');
            });
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "691571373089-t2r3oajabh78af9r1veh4oc5hhb4ebjg.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.getElementById("google-button-container"),
                { theme: "outline", size: "large", width: "350", text: "signup_with" } 
            );
        };
    </script>
</body>
</html>
